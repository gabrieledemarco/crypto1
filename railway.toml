[build]
  builder = "dockerfile"

[[services]]
  name = "api"
  source = "."
  dockerfile = "Dockerfile.api"
  [services.deploy]
    startCommand = "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
  [services.variables]
    PORT = "8000"

[[services]]
  name = "web"
  source = "."
  dockerfile = "Dockerfile.web"
  [services.deploy]
    startCommand = "node server.js"
  [services.variables]
    PORT = "3000"
    NEXT_PUBLIC_API_URL = "${{ api.RAILWAY_PRIVATE_DOMAIN }}"
