<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione Utente</title>
    <style>
       body {
            font-family: Arial, sans-serif;
            background-image: url('https://www.ilcittadinomb.it/wp-content/uploads/2024/08/Binance-annuncia-Immagine2-1000x556.png'); /* Imposta l'immagine di sfondo */
            background-position: center; /* Centra l'immagine */
            margin: 0;
            padding: 20px;
            color: black; /* Colore del testo */
            }
        .container {
            max-width: 405px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
h2 {
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input, .form-group select {
            width: 95%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .form-group button {
            width: 100%;
            padding: 10px;
            background-color: #5cb85c;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        .form-group button:hover {
            background-color: #4cae4c;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Registrazione Utente</h2>
        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="username">Nome Utente</label>
                <input type="text" id="username" name="username" value="{{ form.username.value|default:'' }}" required>
                {{ form.username.errors }}
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ form.email.value|default:'' }}" required>
                {{ form.email.errors }}
            </div>

            <div class="form-group">
                <label for="password1">Password</label>
                <input type="password" id="password1" name="password1" required>
                {{ form.password1.errors }}
            </div>

            <div class="form-group">
                <label for="password2">Conferma Password</label>
                <input type="password" id="password2" name="password2" required>
                {{ form.password2.errors }}
            </div>

            <div class="form-group">
                <label for="api_key">API Key</label>
                <input type="text" id="api_key" name="api_key" value="{{ form.api_key.value|default:'' }}" required>
                {{ form.api_key.errors }}
            </div>

            <div class="form-group">
                <label for="secret_key">Secret Key</label>
                <input type="text" id="secret_key" name="secret_key" value="{{ form.secret_key.value|default:'' }}" required>
                {{ form.secret_key.errors }}
            </div>

            <div class="form-group">
                <button type="submit">Registrati</button>
            </div>
        </form>

        <p>Hai già un account? <a href="{% url 'login' %}">Accedi qui</a></p>
    </div>

<script>
</script>


</body>

</html>
