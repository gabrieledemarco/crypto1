name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: api/requirements.txt
      - name: Install dependencies
        run: pip install -r api/requirements.txt
      - name: Lint Python (non-blocking)
        continue-on-error: true
        run: |
          pip install black flake8 isort --quiet
          black --check api/ engine/ tests/ --line-length 100 --quiet
          isort --check-only api/ engine/ tests/ --profile black --quiet
          flake8 api/ engine/ --max-line-length 100 --extend-ignore=E203,W503,E501 --quiet
      - name: Import smoke test
        run: python -c "import sys; sys.path.insert(0, '.'); import api.main; print('API imports OK')"
        env:
          DUCKDB_PATH: ':memory:'
          ALLOWED_ORIGINS: 'http://localhost:3000'
      - name: Run tests
        env:
          DUCKDB_PATH: ':memory:'
          ALLOWED_ORIGINS: 'http://localhost:3000'
        run: |
          if [ -d "tests" ]; then
            python -m pytest tests/ -v --tb=short -p no:cacheprovider
          else
            echo "No tests/ directory found, skipping pytest"
          fi

  web-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --ignore-scripts
          else
            npm install --ignore-scripts
          fi
      - name: TypeScript type check
        run: npx tsc --noEmit
      - name: Build web
        run: |
          npm ci --prefer-offline 2>/dev/null || npm install --quiet
          npm run build
