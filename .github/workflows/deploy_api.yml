name: Deploy API to Railway

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'api/**'
      - 'engine/**'
      - 'Dockerfile.api'
      - 'railway.toml'

permissions:
  contents: write

jobs:
  deploy:
    name: Build and deploy API
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      API_BASE: "https://illustrious-inspiration-production.up.railway.app"

    steps:
      - uses: actions/checkout@v4

      - name: Resolve IDs and trigger Railway redeploy via GQL
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, sys

          token = os.environ.get("RAILWAY_TOKEN", "")
          if not token:
              print("ERROR: RAILWAY_TOKEN secret is not set.")
              print("Set it in: GitHub repo -> Settings -> Secrets and variables -> Actions -> New secret")
              sys.exit(1)

          gql_url = "https://backboard.railway.app/graphql/v2"
          def gql(query, variables=None):
              body = json.dumps({"query": query, "variables": variables or {}}).encode()
              req = urllib.request.Request(gql_url, data=body, method="POST", headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              })
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      return json.loads(r.read())
              except Exception as e:
                  print(f"GQL error: {e}")
                  return {}

          # Discover project / service / environment
          resp = gql("{ me { projects { edges { node { id name environments { edges { node { id name } } } services { edges { node { id name } } } } } } } }")
          project_id = service_id = env_id = None
          for p in resp.get("data", {}).get("me", {}).get("projects", {}).get("edges", []):
              node = p["node"]
              for s in node.get("services", {}).get("edges", []):
                  if s["node"]["name"].lower() == "api":
                      project_id = node["id"]
                      service_id = s["node"]["id"]
                      envs = node.get("environments", {}).get("edges", [])
                      env_id = next(
                          (e["node"]["id"] for e in envs if "prod" in e["node"]["name"].lower()),
                          envs[0]["node"]["id"] if envs else None
                      )
                      print(f"Found: project={project_id} service={service_id} env={env_id}")
                      break
              if project_id:
                  break

          if not project_id:
              print("ERROR: Could not find 'api' service in Railway account")
              sys.exit(1)

          # Write to GITHUB_ENV for subsequent steps
          gh_env = os.environ.get("GITHUB_ENV", "")
          if gh_env:
              with open(gh_env, "a") as f:
                  f.write(f"RAILWAY_PROJECT_ID={project_id}\n")
                  f.write(f"RAILWAY_ENVIRONMENT_ID={env_id}\n")
                  f.write(f"RAILWAY_SERVICE_ID={service_id}\n")

          # Trigger redeploy via GQL mutation (no CLI needed)
          mutation = """
          mutation redeploy($envId: String!, $svcId: String!) {
            serviceInstanceRedeploy(environmentId: $envId, serviceId: $svcId)
          }
          """
          result = gql(mutation, {"envId": env_id, "svcId": service_id})
          errors = result.get("errors")
          if errors:
              print(f"Redeploy mutation errors: {errors}")
              print("Falling back to railway CLI...")
              sys.exit(2)  # handled below
          else:
              print("Railway redeploy triggered via GQL. Build will take 3-8 min.")
          PYEOF
          EXIT=$?
          if [ $EXIT -eq 2 ]; then
            echo "GQL redeploy failed, trying railway CLI fallback..."
            bash <(curl -fsSL https://railway.com/install.sh) -y 2>/dev/null || \
              npm install -g @railway/cli --silent 2>&1 | tail -2
            RAILWAY_TOKEN=${{ secrets.RAILWAY_TOKEN }} \
              railway up \
                --project "$RAILWAY_PROJECT_ID" \
                --environment "$RAILWAY_ENVIRONMENT_ID" \
                --service api --detach \
                -m "deploy: $(git log -1 --pretty=%s)" || true
          fi

      - name: Wait for new version to be live (max 15 min)
        run: |
          TARGET_VERSION=$(python3 -c "
import json, subprocess
try:
    import re
    with open('api/main.py') as f:
        m = re.search(r'version=\"([^\"]+)\"', f.read())
        print(m.group(1) if m else 'unknown')
except: print('unknown')
")
          echo "Waiting for Railway to serve version=$TARGET_VERSION ..."
          for i in $(seq 1 30); do
            RESP=$(curl -s --max-time 10 "$API_BASE/health" 2>/dev/null || echo '{}')
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$API_BASE/health" 2>/dev/null || echo "000")
            VER=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('version','?'))" 2>/dev/null || echo "?")
            echo "  [$i/30] http=$CODE version=$VER (want=$TARGET_VERSION)"
            [ "$VER" = "$TARGET_VERSION" ] && { echo "New version is live!"; break; }
            sleep 30
          done
          echo "Health check complete."

      - name: Trigger verify_library
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}"
          git pull --rebase origin master || true
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) — post-deploy verify trigger" > .verify-trigger
          git add .verify-trigger
          git commit -m "ci: trigger verify after deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin HEAD:master
