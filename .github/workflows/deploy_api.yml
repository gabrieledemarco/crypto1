name: Deploy API to Railway

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'api/**'
      - 'engine/**'
      - 'Dockerfile.api'
      - 'railway.toml'

permissions:
  contents: write

jobs:
  deploy:
    name: Build and deploy API
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      API_BASE: "https://illustrious-inspiration-production.up.railway.app"

    steps:
      - uses: actions/checkout@v4

      - name: Resolve Railway project IDs
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, sys

          token = os.environ.get("RAILWAY_TOKEN", "")
          if not token:
              print("ERROR: RAILWAY_TOKEN secret is not set.")
              print("Set it in: GitHub repo -> Settings -> Secrets and variables -> Actions -> New secret")
              sys.exit(1)

          gql_url = "https://backboard.railway.app/graphql/v2"
          def gql(query):
              body = json.dumps({"query": query}).encode()
              req = urllib.request.Request(gql_url, data=body, method="POST", headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              })
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      return json.loads(r.read())
              except Exception as e:
                  print(f"GQL error: {e}")
                  return {}

          resp = gql("{ me { projects { edges { node { id name environments { edges { node { id name } } } services { edges { node { id name } } } } } } } }")
          project_id = service_id = env_id = None
          for p in resp.get("data", {}).get("me", {}).get("projects", {}).get("edges", []):
              node = p["node"]
              for s in node.get("services", {}).get("edges", []):
                  if s["node"]["name"].lower() == "api":
                      project_id = node["id"]
                      service_id = s["node"]["id"]
                      envs = node.get("environments", {}).get("edges", [])
                      env_id = next(
                          (e["node"]["id"] for e in envs if "prod" in e["node"]["name"].lower()),
                          envs[0]["node"]["id"] if envs else None
                      )
                      print(f"Found: project={project_id} service={service_id} env={env_id}")
                      break
              if project_id:
                  break

          if not project_id:
              print("ERROR: Could not find 'api' service in Railway account")
              sys.exit(1)

          gh_env = os.environ.get("GITHUB_ENV", "")
          if gh_env:
              with open(gh_env, "a") as f:
                  f.write(f"RAILWAY_PROJECT_ID={project_id}\n")
                  f.write(f"RAILWAY_ENVIRONMENT_ID={env_id}\n")
                  f.write(f"RAILWAY_SERVICE_ID={service_id}\n")
          PYEOF

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          bash <(curl -fsSL https://railway.com/install.sh) -y 2>/dev/null || \
            npm install -g @railway/cli --silent 2>&1 | tail -2
          echo "Deploying API to Railway (project=$RAILWAY_PROJECT_ID service=$RAILWAY_SERVICE_ID)..."
          railway up --service api --detach \
            -m "deploy: $(git log -1 --pretty=%s)"
          echo "Deploy submitted. Waiting 120s for build to start..."
          sleep 120

      - name: Wait for Railway health
        run: |
          echo "Polling /health until 200 (max 10 min)..."
          for i in $(seq 1 20); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$API_BASE/health" 2>/dev/null || echo "000")
            echo "  [$i/20] health=$CODE"
            [ "$CODE" = "200" ] && { echo "API is ready!"; exit 0; }
            sleep 30
          done
          echo "WARNING: API did not become healthy in time"

      - name: Trigger verify_library
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}"
          git pull --rebase origin master || true
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) — post-deploy verify trigger" > .verify-trigger
          git add .verify-trigger
          git commit -m "ci: trigger verify after deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin HEAD:master
