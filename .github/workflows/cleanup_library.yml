name: Cleanup Library — remove non-profitable strategies

on:
  workflow_dispatch:
    inputs:
      min_sharpe:
        description: "Minimum Sharpe to keep (delete below this)"
        required: false
        default: "1.0"
  push:
    branches: [master]
    paths:
      - '.library-cleanup-trigger'

permissions:
  contents: write

jobs:
  cleanup:
    name: Remove unprofitable strategies from Library
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      API_BASE: "https://illustrious-inspiration-production.up.railway.app"
      MIN_SHARPE: ${{ github.event.inputs.min_sharpe || '1.0' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Delete unprofitable strategies
        run: python3 scripts/cleanup_library.py

      - name: Commit cleanup result
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f /tmp/cleanup_result.json ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}"
            git pull --rebase origin master || true
            cp /tmp/cleanup_result.json library-cleanup-result.json
            git add library-cleanup-result.json
            git diff --cached --quiet || git commit -m "ci: library cleanup — kept profitable strategies $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin HEAD:master || echo "Push failed"
          else
            echo "No result file — cleanup script did not complete."
          fi
