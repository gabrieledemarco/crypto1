name: Verify Library Strategies

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    name: Check strategies visible on Railway
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Check /strategies endpoint
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, sys, traceback

          API_BASE = "https://illustrious-inspiration-production.up.railway.app"
          result = {"api_base": API_BASE, "health": None, "total": 0,
                    "live": 0, "starred": 0, "btc_eth": [], "error": None}

          # Health check
          try:
              with urllib.request.urlopen(f"{API_BASE}/health", timeout=15) as r:
                  result["health"] = {"status": r.status, "body": json.loads(r.read())}
              print(f"Health: {result['health']}")
          except Exception as e:
              result["health"] = {"error": str(e)}
              print(f"Health FAILED: {e}")

          # Strategies check
          try:
              req = urllib.request.Request(f"{API_BASE}/strategies")
              with urllib.request.urlopen(req, timeout=20) as r:
                  strats = json.loads(r.read())

              total   = len(strats)
              live    = [s for s in strats if s.get("status") == "live"]
              starred = [s for s in strats if s.get("starred")]
              btc_eth = [s for s in strats if any(k in s.get("name","").upper()
                                                    for k in ["BTC","ETH"])]

              print(f"Total strategies : {total}")
              print(f"Live (ROBUST)    : {len(live)}")
              print(f"Starred          : {len(starred)}")
              print(f"BTC/ETH entries  : {len(btc_eth)}")
              for s in btc_eth:
                  sh = s.get("metrics",{}).get("sharpe",0)
                  print(f"  {s['id']}  {s['name']:<35}  status={s['status']}  starred={s['starred']}  sharpe={sh}")

              result.update({
                  "total": total, "live": len(live), "starred": len(starred),
                  "btc_eth": [{"id":s["id"],"name":s["name"],"status":s["status"],
                               "starred":s["starred"],
                               "sharpe":s.get("metrics",{}).get("sharpe",0)}
                              for s in btc_eth],
              })
              print("VERIFICATION COMPLETE")
          except Exception as e:
              result["error"] = traceback.format_exc()
              print(f"Strategies FAILED: {e}")

          with open("/tmp/verify_result.json", "w") as f:
              json.dump(result, f, indent=2)
          PYEOF

      - name: Commit verification result
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f /tmp/verify_result.json ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}"
            git pull --rebase origin master || true
            cp /tmp/verify_result.json library-verify-result.json
            git add library-verify-result.json
            git diff --cached --quiet || git commit -m "ci: library verification $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin HEAD:master
          fi
