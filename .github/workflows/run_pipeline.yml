name: BTC Strategy Pipeline

on:
  push:
    branches:
      - claude/btc-price-analysis-strategy-zARFu
      - master
  workflow_dispatch:

jobs:
  pipeline:
    name: Run Analysis Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: btc_analysis/requirements.txt

      - name: Install dependencies
        run: pip install -r btc_analysis/requirements.txt

      - name: Run pipeline
        run: python3 btc_analysis/run_all.py

      - name: Smoke-test Streamlit app
        run: |
          timeout 15 streamlit run btc_analysis/app.py \
            --server.headless true \
            --server.port 8501 \
            -- --server.runOnSave false \
          || true

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output-${{ github.run_number }}
          path: |
            btc_analysis/output/*.csv
            btc_analysis/output/*.txt
            btc_analysis/output/*.png
          retention-days: 30
