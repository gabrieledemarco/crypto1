name: Run Server-Side Pipeline

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: "Comma-separated tickers (crypto supported)"
        required: false
        default: "BTC-USD,ETH-USD,SOL-USD"
      timeframes:
        description: "Comma-separated timeframes (1m,5m,15m,1h,4h,1d)"
        required: false
        default: "1m,5m,15m,1h"
      max_iter:
        description: "Total iterations per ticker (e.g. 40 = 10 per TF with 4 TFs)"
        required: false
        default: "40"
      stop_sharpe:
        description: "Stop early when Sharpe >= this"
        required: false
        default: "1.5"
      max_dd:
        description: "Max acceptable drawdown %"
        required: false
        default: "20"
  push:
    branches: [master]
    paths:
      - '.pipeline-trigger'

jobs:
  pipeline:
    name: Trigger Railway Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4

      - name: Build request payload
        id: params
        run: |
          python3 << 'PYEOF'
          import json, os

          event = os.environ.get("GITHUB_EVENT_NAME", "workflow_dispatch")

          if event == "push":
              with open(".pipeline-trigger") as f:
                  params = json.load(f)
              params.pop("triggered_at", None)
          else:
              params = {
                  "tickers":     [t.strip() for t in "${{ github.event.inputs.tickers }}".split(",")],
                  "timeframes":  [t.strip() for t in "${{ github.event.inputs.timeframes }}".split(",")],
                  "max_iter":    int("${{ github.event.inputs.max_iter }}"),
                  "stop_sharpe": float("${{ github.event.inputs.stop_sharpe }}"),
                  "max_dd":      float("${{ github.event.inputs.max_dd }}"),
              }

          payload = json.dumps(params)
          print(f"Payload: {payload}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"payload={payload}\n")
          PYEOF

      - name: Wait for Railway deployment
        if: github.event_name == 'push'
        run: |
          echo "Waiting 6 minutes for Railway to finish building and deploying ..."
          sleep 360
          echo "Proceeding."

      - name: Start pipeline job on Railway
        id: start
        env:
          API_BASE: "https://illustrious-inspiration-production.up.railway.app"
          PAYLOAD: ${{ steps.params.outputs.payload }}
        run: |
          echo "Posting to $API_BASE/runs/pipeline ..."
          RESPONSE=$(curl -sf --max-time 30 -X POST "$API_BASE/runs/pipeline" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD")
          echo "response=$RESPONSE"
          JOB_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "Started pipeline job: $JOB_ID"
          echo "Stream: $API_BASE/runs/pipeline/$JOB_ID/stream"

      - name: Stream pipeline events
        env:
          API_BASE: "https://illustrious-inspiration-production.up.railway.app"
          JOB_ID: ${{ steps.start.outputs.job_id }}
        run: |
          echo "Streaming events for job $JOB_ID ..."

          cat > /tmp/stream_events.py << 'PYEOF'
          import sys, json

          for raw in sys.stdin:
              raw = raw.strip()
              if not raw.startswith("data:"):
                  continue
              try:
                  evt = json.loads(raw[5:].strip())
              except Exception:
                  continue

              t = evt.get("type", "")
              if t == "start":
                  tfs = evt.get("timeframes", [])
                  n_per_tf = int(evt.get("max_iter", 0)) // max(len(tfs), 1)
                  print(f"[start] tickers={evt['tickers']}", flush=True)
                  print(f"        timeframes={tfs}  max_iter={evt.get('max_iter')}  (~{n_per_tf} iters/TF)", flush=True)
                  print(f"        stop_sharpe={evt.get('stop_sharpe')}  max_dd={evt.get('max_dd')}%", flush=True)
              elif t == "ticker_start":
                  print(f"\n{'='*60}", flush=True)
                  print(f"[{evt['idx']}/{evt['total']}] {evt['ticker']}", flush=True)
                  print(f"{'='*60}", flush=True)
              elif t == "downloading":
                  print(f"  -> download {evt['ticker']} {evt['tf']} ({evt['period']})", flush=True)
              elif t == "download_done":
                  print(f"  -> OK       {evt['ticker']} {evt['tf']}: {evt['bars']:,} bars  {evt['start']} -> {evt['end']}", flush=True)
              elif t == "download_error":
                  print(f"  -> FAIL     {evt['ticker']} {evt['tf']}: {evt['msg']}", flush=True)
              elif t == "iter_start":
                  print(f"  [{evt['iter']:>3}] {evt['tf']:<4} arch={evt['arch']}", flush=True)
              elif t == "iter_done":
                  verdict = evt['verdict']
                  star = " ***ROBUST***" if verdict == "ROBUST" else (" ." if verdict == "marginal" else "")
                  print(f"         Sharpe={evt['sharpe']:+.3f}  DD={evt['dd']:+.1f}%  N={evt['n_trades']}  WR={evt['win_rate']:.1f}%  [{verdict}]{star}", flush=True)
              elif t == "iter_error":
                  print(f"  [{evt['iter']:>3}] ERROR: {evt['msg']}", flush=True)
              elif t == "ticker_done":
                  v = evt['verdict']
                  if v == "ROBUST":
                      print(f"\n  SAVED -> Library  sid={evt['sid']}  {evt.get('tf','')}  Sharpe={evt['sharpe']}  DD={evt['dd']}%", flush=True)
                  else:
                      best = evt.get('sharpe')
                      print(f"\n  Best: Sharpe={best}  ({v})", flush=True)
              elif t == "complete":
                  print(f"\n{'='*60}", flush=True)
                  print(f"PIPELINE COMPLETE", flush=True)
                  print(f"  Tickers processed : {evt['total_tickers']}", flush=True)
                  print(f"  ROBUST strategies : {evt['robust_found']}", flush=True)
                  print(f"{'='*60}", flush=True)
                  for s in evt.get("summary", []):
                      flag = "*" if s["verdict"] == "ROBUST" else " "
                      sh   = s.get("sharpe") or 0.0
                      tf   = s.get("tf") or "?"
                      print(f"{flag} {s['ticker']:<12} {tf:<5} {sh:>+8.3f}  {s['verdict']}", flush=True)
                  break
              elif t == "error":
                  print(f"\nPIPELINE ERROR: {evt['msg']}", flush=True)
                  sys.exit(1)
          PYEOF

          curl -sN --max-time 86400 "$API_BASE/runs/pipeline/$JOB_ID/stream" \
            | python3 /tmp/stream_events.py
